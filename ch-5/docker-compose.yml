services:

  scylla:
    image: scylladb/scylla:latest
    container_name: scylla_db
    command: --smp 1 --memory 1G --overprovisioned 1
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT cluster_name FROM system.local'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - wikistats-networks
    volumes:
      - scylla_data:/var/lib/scylla

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk topic list --brokers redpanda:9092 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - wikistats-networks

  wikistats-producer:
    container_name: wikistats-producer
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./wikistats-producer"]
    env_file:
      - .env
    ports:
      - "${PRODUCER_PORT}:${PORT}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:${PORT}/liveness || exit 1"]
      interval: 5s 
      timeout: 3s
      retries: 5
      start_period: 15s 
    networks:
      - wikistats-networks
    depends_on:
      scylla:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  wikistats-consumer:
    container_name: wikistats-consumer
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./wikistats-consumer"]
    env_file:
      - .env
    ports:
      - "${CONSUMER_PORT}:${PORT}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:${PORT}/liveness || exit 1"]
      interval: 5s 
      timeout: 3s
      retries: 5
      start_period: 15s 
    networks:
      - wikistats-networks
    depends_on:
      scylla:
        condition: service_healthy
      wikistats-producer:
        condition: service_healthy

networks:
  wikistats-networks:
    driver: bridge

volumes:
  scylla_data:
name: WikiStats Tests
on: 
  pull_request:
    branches: [ main ]

env:
  WORKING_DIR: ./ch-4

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
        
      - name: Run linters
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./api/...

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
        
      - name: Run tests
        working-directory: ${{ env.WORKING_DIR }}
        run: go test -v ./api/...
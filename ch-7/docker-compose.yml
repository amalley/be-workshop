services:

  # ScyllaDB service to run the Cassandra-compatible NoSQL database
  scylla:
    image: scylladb/scylla:latest
    container_name: scylla_db
    command: --smp 1 --memory 1G --overprovisioned 1
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT cluster_name FROM system.local'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - wikistats-networks
    volumes:
      - scylla_data:/var/lib/scylla

  # Redpanda service to run the Kafka-compatible streaming platform
  redpanda:
    image: redpandadata/redpanda:v23.3.13
    container_name: redpanda
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk topic list --brokers redpanda:9092 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - wikistats-networks

  # Redpanda Console service to provide a web-based interface for managing and monitoring Redpanda
  console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    networks:
      - wikistats-networks
    ports:
      - "8080:8080"
    volumes:
      - ./.configs/redpanda/console.yml:/etc/redpanda/console.yml
      - ./protobuf:/etc/protobuf
    environment:
      KAFKA_BROKERS: "redpanda:29092"
      CONFIG_FILEPATH: "/etc/redpanda/console.yml"
      CONSOLE_METRICS_ENABLED: "true"
    depends_on:
      redpanda:
        condition: service_healthy

  # Prometheus service to scrape metrics from Redpanda and Redpanda Console
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - wikistats-networks
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9090"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - ./.configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      redpanda:
        condition: service_healthy

  # Grafana service to visualize metrics from Prometheus
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - wikistats-networks
    ports:
      - "3000:3000"
    volumes:
      - ./.configs/grafana/provisioning:/etc/grafana/provisioning      
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/etc/grafana/provisioning/dashboards/definitions/wikistats-producer-dashboard.json"
    depends_on:
      prometheus:
        condition: service_healthy

  # Wikistats Producer service to generate and send Wikipedia edit statistics to Redpanda
  wikistats-producer:
    container_name: wikistats-producer
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./wikistats-producer"]
    env_file:
      - .env
    ports:
      - "${PRODUCER_PORT}:${PORT}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:${PORT}/liveness || exit 1"]
      interval: 5s 
      timeout: 3s
      retries: 5
      start_period: 15s 
    networks:
      - wikistats-networks
    depends_on:
      redpanda:
        condition: service_healthy

  # Wikistats Consumer service to consume Wikipedia edit statistics from Redpanda and store them in ScyllaDB
  wikistats-consumer:
    container_name: wikistats-consumer
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./wikistats-consumer"]
    env_file:
      - .env
    ports:
      - "${CONSUMER_PORT}:${PORT}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:${PORT}/liveness || exit 1"]
      interval: 5s 
      timeout: 3s
      retries: 5
      start_period: 15s 
    networks:
      - wikistats-networks
    depends_on:
      scylla:
        condition: service_healthy
      wikistats-producer:
        condition: service_healthy

networks:
  wikistats-networks:
    driver: bridge

volumes:
  scylla_data:
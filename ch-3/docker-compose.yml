services:

  scylla:
    image: scylladb/scylla:latest
    container_name: scylla_db
    command: --smp 1 --memory 1G --overprovisioned 1
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT cluster_name FROM system.local'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - wikistats-networks
    volumes:
      - scylla_data:/var/lib/scylla

  wikistats:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${HOST_PORT}:${PORT}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:${PORT}/liveness || exit 1"]
      interval: 5s 
      timeout: 3s
      retries: 5
      start_period: 15s 
    networks:
      - wikistats-networks
    depends_on:
      scylla:
        condition: service_healthy

networks:
  wikistats-networks:
    driver: bridge

volumes:
  scylla_data:
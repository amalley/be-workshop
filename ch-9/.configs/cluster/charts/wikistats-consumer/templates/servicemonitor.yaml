apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Chart.Name }}-servicemonitor
  namespace: wikistats
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  namespaceSelector:
    matchNames:
      - wikistats
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
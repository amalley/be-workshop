apiVersion: 1
providers:

  # Producer dashboard definition to visualize metrics related to the Wikistats Consumer service
  - name: 'Wikistats Consumer Dashboard'
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/definitions/wikistats-consumer-dashboard.json

  # Producer dashboard definition to visualize metrics related to the Wikistats Producer service
  - name: 'Wikistats Producer Dashboard'
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/definitions/wikistats-producer-dashboard.json